<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="A small BFME II and Rise of the Witch-king archive for custom maps and useful downloads."
  >
  <title>BFME II Archive</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <header class="visually-hidden">
    <h1>BFME II Archive</h1>
  </header>

  <main>
    <section id="portal-screen" aria-labelledby="portal-heading">
      <h2 id="portal-heading" class="visually-hidden">Entrance Portal</h2>

      <img
        class="portal-image"
        src="data/images/portal-bg.jpg"
        alt="The Doors of Durin should appear here; try to reload when the moonlight returns."
      >

      <p class="portal-text">
        Click <button id="friend-button" type="button">friend</button> and enter!
      </p>
    </section>

    <section id="homepage-screen" class="hidden" aria-labelledby="homepage-heading">
      <h2 id="homepage-heading" class="visually-hidden">Main Menu</h2>

      <p id="audio-message" class="audio-message" hidden>
        Music could not be loaded or played.
      </p>

      <nav aria-label="Main navigation">
        <ul>
          <li><a href="maps.html">Maps</a></li>
          <li><a href="other.html">Other</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="imprint.html">Imprint</a></li>
        </ul>
      </nav>
    </section>
  </main>

  <audio id="menu-music" src="data/audio/menu-theme.mp3" loop></audio>

  <script src="app.js"></script>
</body>
</html>
